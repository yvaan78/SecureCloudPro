            <div class="criteria-item criteria-error" id="crit-upper"><span>❌</span> Lettre majuscule</div>
            <div class="criteria-item criteria-error" id="crit-digit"><span>❌</span> Un chiffre</div>
            <div class="criteria-item criteria-error" id="crit-special"><span>❌</span> Caractère spécial</div>

<script>
    const passwordInput = document.getElementById('password');
    
    passwordInput.addEventListener('input', function() {
        const val = this.value;
        
        const requirements = [
            { id: 'crit-length',  met: val.length >= 14 },
            { id: 'crit-lower',   met: /[a-z]/.test(val) },
            { id: 'crit-upper',   met: /[A-Z]/.test(val) },
            { id: 'crit-digit',   met: /[0-9]/.test(val) },
            { id: 'crit-special', met: /[!@#$%^&*()\-_=+{};:,<.>]/.test(val) }
        ];

        requirements.forEach(req => {
            const el = document.getElementById(req.id);
            if (req.met) {
                el.innerHTML = `<span>✅</span> ${el.innerText.substring(2)}`;
                el.className = 'criteria-item criteria-ok';
            } else {
                el.innerHTML = `<span>❌</span> ${el.innerText.substring(2)}`;
                el.className = 'criteria-item criteria-error';
            }
        });
    });
</script>
