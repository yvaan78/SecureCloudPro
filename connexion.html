<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureCloud Pro - Connexion</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* On force le bouton à être toujours cliquable quoi qu'il arrive */
        .btn-submit-safe {
            position: relative !important;
            z-index: 9999 !important;
            pointer-events: auto !important;
            cursor: pointer !important;
        }
    </style>
</head>
<body>

<div class="page-container">
    <div class="card" style="text-align: center;">
        <div class="logo-container">
            <img src="SecureCloudPro.png" alt="Logo" class="logo-img" style="width: 70px;">
        </div>

        <form action="verification.php" method="POST" style="margin-top: 40px; text-align: left;">
            <div class="form-group">
                <label for="login_id">Identifiant ou adresse email</label>
                <input type="text" name="login_id" id="login_id" class="form-input" style="height: 50px;" required>
            </div>
            <div class="form-group" style="margin-top: 20px;">
                <label for="password">Mot de passe</label>
                <input type="password" name="password" id="password" class="form-input" style="height: 50px;" required>
            </div>
            
            <div style="margin-top: 30px;">
                <button type="submit" class="btn btn-black btn-submit-safe" style="border-radius: 20px; width: 100%;">
                    Suivant
                </button>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="index.html" style="text-decoration: none; color: #666; font-size: 0.9rem;">Retour à l'accueil</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
